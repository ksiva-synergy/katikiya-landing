  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

flow:hidden; background:#0C0A07;\">\n  <div style=\"position:absolute; left:50%; bottom:-32vh; width:130vw; height:72vh; border-radius:50%; background:radial-gradient(ellipse at center, rgba(195,154,87,0.2) 0%, rgba(195,154,87,0.06) 42%, rgba(12,10,7,0) 70%); animation:dwGlow 11s ease-in-out infinite; pointer-events:none; transform:translateX(-50%);\"><\u002Fdiv>\n\n  <header style=\"display:flex; justify-content:space-between; align-items:center; padding:28px 48px; position:relative; z-index:2; flex-wrap:wrap; gap:16px;\">\n    <div style=\"display:flex; align-items:baseline; gap:10px;\">\n      <span style=\"font-family:'Bodoni Moda',serif; font-size:22px; letter-spacing:0.3em; font-weight:500;\">DWELL<\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.2em; color:#9A8C74; border-left:1px solid rgba(195,154,87,0.3); padding-left:10px;\">FOR CARE HOMES<\u002Fspan>\n    <\u002Fdiv>\n    <nav style=\"display:flex; gap:clamp(16px,3vw,36px); flex-wrap:wrap;\">\n      <a href=\"#approach\" style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.24em; color:#9A8C74;\">APPROACH<\u002Fa>\n      <a href=\"#features\" style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.24em; color:#9A8C74;\">FEATURES<\u002Fa>\n      <a href=\"#privacy\" style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.24em; color:#9A8C74;\">PRIVACY<\u002Fa>\n      <a href=\"#contact\" style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.24em; color:#9A8C74;\">CONTACT<\u002Fa>\n    <\u002Fnav>\n    <a href=\"#contact\" data-magnet=\"\" style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.22em; color:#0C0A07; background:#EBD3A2; padding:12px 20px; border-radius:2px;\">TALK TO US<\u002Fa>\n  <\u002Fheader>\n\n  <div style=\"flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:60px 24px 40px; position:relative; z-index:2;\">\n    <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.36em; color:#9A8C74; margin-bottom:32px;\">FOR ASSISTED-LIVING &amp; CARE-HOME OPERATORS — SOUTH INDIA<\u002Fdiv>\n    <h1 data-reveal=\"\" data-delay=\"120\" style=\"font-family:'Bodoni Moda',serif; font-weight:400; font-size:clamp(48px,8.5vw,112px); line-height:1.05; margin:0; letter-spacing:-0.01em; max-width:1100px;\">Safety, not<br><em style=\"font-style:italic; color:#EBD3A2;\">surveillance.<\u002Fem><\u002Fh1>\n    <p data-reveal=\"\" data-delay=\"260\" style=\"max-width:600px; font-size:18px; line-height:1.75; color:#B7A98E; margin:38px 0 44px;\">Dwell replaces cameras and panic buttons with ambient sensing that protects residents everywhere they live — including the bathroom and bedroom, where cameras can't and shouldn't go.<\u002Fp>\n    <div data-reveal=\"\" data-delay=\"380\" style=\"display:flex; gap:20px; align-items:center; flex-wrap:wrap; justify-content:center;\">\n      <a href=\"#contact\" data-magnet=\"\" style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.26em; color:#0C0A07; background:#EBD3A2; padding:19px 34px; border-radius:2px; display:inline-block;\">TALK TO US ABOUT YOUR FACILITY<\u002Fa>\n      <a href=\"#approach\" style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.22em; color:#EBD3A2; border-bottom:1px solid rgba(195,154,87,0.4); padding-bottom:6px;\">SEE HOW IT WORKS ↓<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-reveal=\"\" data-delay=\"440\" style=\"position:relative; z-index:2; padding:0 24px 48px; display:flex; justify-content:center; gap:clamp(20px,4vw,52px); flex-wrap:wrap;\">\n    <div style=\"display:flex; align-items:baseline; gap:10px;\"><span style=\"width:5px; height:5px; border-radius:50%; background:#9FE8DC; animation:dwBreathe 3.2s ease-in-out infinite;\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.24em; color:#9A8C74;\">CAMERAS<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:#9FE8DC;\">ZERO<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex; align-items:baseline; gap:10px;\"><span style=\"width:5px; height:5px; border-radius:50%; background:#9FE8DC; animation:dwBreathe 2.6s ease-in-out infinite .5s;\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.24em; color:#9A8C74;\">WEARABLES<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:#9FE8DC;\">NONE TO FORGET<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex; align-items:baseline; gap:10px;\"><span style=\"width:5px; height:5px; border-radius:50%; background:#9FE8DC; animation:dwBreathe 3.8s ease-in-out infinite 1s;\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.24em; color:#9A8C74;\">PRIVATE ROOMS<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:#9FE8DC;\">COVERED<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 02 THE PROBLEM -->\n<div id=\"why-now\" data-screen-label=\"02 The Problem\" style=\"position:relative; padding:18vh 24px; background:#0C0A07;\">\n  <div style=\"max-width:900px; margin:0 auto; text-align:center;\">\n    <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.4em; color:#6E6350; margin-bottom:28px;\">MOVEMENT II — THE PROBLEM<\u002Fdiv>\n    <h2 data-reveal=\"\" data-delay=\"100\" style=\"font-family:'Bodoni Moda',serif; font-weight:400; font-size:clamp(32px,4.4vw,58px); line-height:1.2; margin:0 0 36px;\">CCTV and a panic button aren't a safety plan.<\u002Fh2>\n    <p data-reveal=\"\" data-delay=\"200\" style=\"font-size:17px; line-height:1.85; color:#B7A98E; margin:0 0 60px;\">Most facilities in Bengaluru, Chennai and Hyderabad already have both. Neither one catches the moment that matters most.<\u002Fp>\n  <\u002Fdiv>\n  <div style=\"max-width:1000px; margin:0 auto; display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:1px; background:rgba(195,154,87,0.14); border:1px solid rgba(195,154,87,0.14);\">\n    <div data-reveal=\"\" style=\"background:#120E0A; padding:36px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:0.3em; color:#6E6350; margin-bottom:16px;\">I / PANIC BUTTONS<\u002Fdiv>\n      <p style=\"font-size:15px; line-height:1.75; color:#9A8C74; margin:0;\">Only work if a resident is conscious, mobile, and remembers to press it. A fall rarely leaves them able to do any of the three.<\u002Fp>\n    <\u002Fdiv>\n    <div data-reveal=\"\" data-delay=\"80\" style=\"background:#120E0A; padding:36px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:0.3em; color:#6E6350; margin-bottom:16px;\">II / CCTV<\u002Fdiv>\n      <p style=\"font-size:15px; line-height:1.75; color:#9A8C74; margin:0;\">Covers common areas, not bathrooms or bedrooms. And a lens in a private space costs dignity — and staff trust — every day it runs.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 03 APPROACH -->\n<div id=\"approach\" data-screen-label=\"03 Approach\" style=\"position:relative; padding:18vh 0; background:#120E0A; border-top:1px solid rgba(195,154,87,0.14); border-bottom:1px solid rgba(195,154,87,0.14);\">\n  <div style=\"max-width:1100px; margin:0 auto; padding:0 48px; text-align:center;\">\n    <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.4em; color:#6E6350; margin-bottom:24px;\">MOVEMENT III — SAFETY WITHOUT SURVEILLANCE<\u002Fdiv>\n    <h2 data-reveal=\"\" data-delay=\"100\" style=\"font-family:'Bodoni Moda',serif; font-weight:400; font-size:clamp(34px,4.6vw,64px); line-height:1.18; margin:0 0 24px; max-width:820px; margin-left:auto; margin-right:auto;\">Sensing that works through the air, <em style=\"font-style:italic; color:#EBD3A2;\">not through a lens.<\u002Fem><\u002Fh2>\n    <p data-reveal=\"\" data-delay=\"200\" style=\"max-width:640px; font-size:16px; line-height:1.85; color:#B7A98E; margin:0 auto;\">Ambient radar reads movement, breathing and falls the way a caregiver would notice them — quietly, constantly, without ever capturing an image. It works in total darkness, through steam, behind a closed bathroom door.<\u002Fp>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1100px; margin:10vh auto 0; padding:0 48px; display:grid; grid-template-columns:1fr 1fr; gap:0; border:1px solid rgba(195,154,87,0.14);\">\n    <div data-reveal=\"\" style=\"background:#0E0B08; padding:44px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.3em; color:#6E6350; margin-bottom:24px;\">TYPICAL MONITORING<\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:16px;\">\n        <div style=\"font-size:15px; line-height:1.6; color:#9A8C74; padding-left:24px; position:relative;\"><span style=\"position:absolute; left:0;\">✕<\u002Fspan>Camera footage, common areas only<\u002Fdiv>\n        <div style=\"font-size:15px; line-height:1.6; color:#9A8C74; padding-left:24px; position:relative;\"><span style=\"position:absolute; left:0;\">✕<\u002Fspan>Blind to bathrooms and bedrooms<\u002Fdiv>\n        <div style=\"font-size:15px; line-height:1.6; color:#9A8C74; padding-left:24px; position:relative;\"><span style=\"position:absolute; left:0;\">✕<\u002Fspan>Residents feel watched, staff feel surveilled<\u002Fdiv>\n        <div style=\"font-size:15px; line-height:1.6; color:#9A8C74; padding-left:24px; position:relative;\"><span style=\"position:absolute; left:0;\">✕<\u002Fspan>Alerts only after someone notices the feed<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div data-reveal=\"\" data-delay=\"80\" style=\"background:#1B140C; padding:44px; border-left:1px solid rgba(195,154,87,0.14);\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.3em; color:#EBD3A2; margin-bottom:24px;\">DWELL<\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:16px;\">\n        <div style=\"font-size:15px; line-height:1.6; color:#EDE4D3; padding-left:24px; position:relative;\"><span style=\"position:absolute; left:0; color:#9FE8DC;\">✓<\u002Fspan>Radar sensing, every room including private ones<\u002Fdiv>\n        <div style=\"font-size:15px; line-height:1.6; color:#EDE4D3; padding-left:24px; position:relative;\"><span style=\"position:absolute; left:0; color:#9FE8DC;\">✓<\u002Fspan>Built for the bathroom and bedroom first<\u002Fdiv>\n        <div style=\"font-size:15px; line-height:1.6; color:#EDE4D3; padding-left:24px; position:relative;\"><span style=\"position:absolute; left:0; color:#9FE8DC;\">✓<\u002Fspan>No lens, no image, no video — ever<\u002Fdiv>\n        <div style=\"font-size:15px; line-height:1.6; color:#EDE4D3; padding-left:24px; position:relative;\"><span style=\"position:absolute; left:0; color:#9FE8DC;\">✓<\u002Fspan>Real-time alerts the moment something changes<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 04 FEATURES -->\n<div id=\"features\" data-screen-label=\"04 Features\" style=\"position:relative; padding:18vh 0; background:#0C0A07;\">\n  <div style=\"max-width:1240px; margin:0 auto; padding:0 48px;\">\n    <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.4em; color:#6E6350; margin-bottom:24px;\">MOVEMENT IV — ONE PLATFORM, EVERY HOUR<\u002Fdiv>\n    <h2 data-reveal=\"\" data-delay=\"100\" style=\"font-family:'Bodoni Moda',serif; font-weight:400; font-size:clamp(36px,4.8vw,68px); line-height:1.1; margin:0 0 12vh; max-width:760px;\">What Dwell covers, room by room.<\u002Fh2>\n\n    <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:rgba(195,154,87,0.14); border:1px solid rgba(195,154,87,0.14);\">\n      <sc-for list=\"{{ features }}\" as=\"f\" hint-placeholder-count=\"8\">\n        <div data-reveal=\"\" style=\"background:#120E0A; padding:30px; display:flex; flex-direction:column; gap:14px; min-height:260px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:0.3em; color:#6E6350;\">{{ f.num }}<\u002Fdiv>\n          <div style=\"font-family:'Bodoni Moda',serif; font-size:21px; line-height:1.25; color:#EDE4D3;\">{{ f.title }}<\u002Fdiv>\n          <p style=\"font-size:13.5px; line-height:1.65; color:#9A8C74; margin:0; flex:1;\">{{ f.desc }}<\u002Fp>\n          <div style=\"display:flex; flex-direction:column; gap:8px; padding-top:14px; border-top:1px solid rgba(195,154,87,0.14);\">\n            <div style=\"font-size:13px; font-weight:500; color:#B7A98E;\">{{ f.stat }}<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:0.2em; color:{{ f.tagColor }}; text-transform:uppercase;\">{{ f.tag }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 05 PRIVACY -->\n<div id=\"privacy\" data-screen-label=\"05 Privacy\" style=\"position:relative; padding:18vh 0; background:#120E0A; border-top:1px solid rgba(195,154,87,0.14); border-bottom:1px solid rgba(195,154,87,0.14);\">\n  <div style=\"max-width:1200px; margin:0 auto; padding:0 48px; display:grid; grid-template-columns:0.85fr 1.15fr; gap:64px; align-items:start;\">\n    <div style=\"position:sticky; top:100px;\">\n      <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.4em; color:#6E6350; margin-bottom:24px;\">MOVEMENT V — PRIVACY &amp; TRUST<\u002Fdiv>\n      <h2 data-reveal=\"\" data-delay=\"100\" style=\"font-family:'Bodoni Moda',serif; font-weight:400; font-size:clamp(32px,4.2vw,54px); line-height:1.2; margin:0 0 24px;\">Built so no one has to trust us blindly.<\u002Fh2>\n      <p data-reveal=\"\" data-delay=\"180\" style=\"font-size:16px; line-height:1.85; color:#B7A98E; margin:0 0 28px;\">Privacy isn't a settings menu we bolted on. It's the reason ambient sensing exists in the first place.<\u002Fp>\n      <div data-reveal=\"\" data-delay=\"240\" style=\"display:inline-flex; align-items:center; gap:10px; font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.2em; color:#9FE8DC; border:1px solid rgba(159,232,220,0.3); padding:10px 16px;\">DPDPA 2023 — BUILT FOR IT, NOT JUST COMPLIANT WITH IT<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:1px; background:rgba(195,154,87,0.14); border:1px solid rgba(195,154,87,0.14);\">\n      <sc-for list=\"{{ privacyPoints }}\" as=\"p\" hint-placeholder-count=\"6\">\n        <div data-reveal=\"\" style=\"background:#0E0B08; padding:28px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:0.24em; color:#9FE8DC; margin-bottom:14px;\">{{ p.tag }}<\u002Fdiv>\n          <div style=\"font-size:15px; font-weight:600; color:#EDE4D3; margin-bottom:8px;\">{{ p.title }}<\u002Fdiv>\n          <p style=\"font-size:13.5px; line-height:1.65; color:#9A8C74; margin:0;\">{{ p.desc }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 06 THREE COLUMNS -->\n<div data-screen-label=\"06 Who It Serves\" style=\"position:relative; padding:18vh 24px; background:#0C0A07;\">\n  <div style=\"max-width:1200px; margin:0 auto;\">\n    <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.4em; color:#6E6350; margin-bottom:24px; text-align:center;\">MOVEMENT VI — EVERYONE IN THE BUILDING<\u002Fdiv>\n    <h2 data-reveal=\"\" data-delay=\"100\" style=\"font-family:'Bodoni Moda',serif; font-weight:400; font-size:clamp(30px,4vw,50px); margin:0 0 10vh; text-align:center;\">Everyone in the building benefits.<\u002Fh2>\n    <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:rgba(195,154,87,0.14); border:1px solid rgba(195,154,87,0.14);\">\n      <sc-for list=\"{{ audiences }}\" as=\"a\" hint-placeholder-count=\"3\">\n        <div data-reveal=\"\" style=\"background:#120E0A; padding:36px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.3em; color:#EBD3A2; margin-bottom:20px;\">{{ a.label }}<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:14px;\">\n            <sc-for list=\"{{ a.points }}\" as=\"pt\" hint-placeholder-count=\"3\">\n              <div style=\"font-size:14.5px; line-height:1.55; color:#B7A98E; padding-left:18px; position:relative;\"><span style=\"position:absolute; left:0; color:#C39A57;\">—<\u002Fspan>{{ pt }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 07 WHY NOW -->\n<div data-screen-label=\"07 Market Context\" style=\"position:relative; padding:16vh 24px; background:#120E0A; border-top:1px solid rgba(195,154,87,0.14);\">\n  <div style=\"max-width:800px; margin:0 auto; text-align:center;\">\n    <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.4em; color:#6E6350; margin-bottom:24px;\">MOVEMENT VII — WHY NOW<\u002Fdiv>\n    <h2 data-reveal=\"\" data-delay=\"100\" style=\"font-family:'Bodoni Moda',serif; font-weight:400; font-size:clamp(28px,3.4vw,44px); line-height:1.3; margin:0 0 24px;\">South India's senior living sector is growing fast — and most facilities are still running on CCTV and a wall-mounted button.<\u002Fh2>\n    <p data-reveal=\"\" data-delay=\"200\" style=\"font-size:16px; line-height:1.8; color:#B7A98E; margin:0;\">Operators who move first on ambient monitoring won't just catch more falls sooner — they'll have an easier story to tell every family walking through the door.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 08 CTA / CONTACT -->\n<div id=\"contact\" data-screen-label=\"08 Contact\" style=\"position:relative; padding:18vh 24px; background:#0C0A07;\">\n  <div style=\"max-width:1100px; margin:0 auto; display:grid; grid-template-columns:0.9fr 1.1fr; gap:64px; align-items:start;\">\n    <div>\n      <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.4em; color:#6E6350; margin-bottom:24px;\">MOVEMENT VIII — LET'S TALK<\u002Fdiv>\n      <h2 data-reveal=\"\" data-delay=\"100\" style=\"font-family:'Bodoni Moda',serif; font-weight:400; font-size:clamp(32px,4vw,52px); line-height:1.2; margin:0 0 24px;\">Let's talk about your facility.<\u002Fh2>\n      <p data-reveal=\"\" data-delay=\"180\" style=\"font-size:16px; line-height:1.8; color:#B7A98E; margin:0;\">Tell us a little about your facility and a member of our team will reach out to walk through fit, pricing and pilot options.<\u002Fp>\n    <\u002Fdiv>\n    <sc-if value=\"{{ !submitted }}\" hint-placeholder-val=\"{{ true }}\">\n      <form data-reveal=\"\" data-delay=\"150\" style=\"border:1px solid rgba(195,154,87,0.22); background:#120E0A; padding:clamp(28px,4vw,44px); display:flex; flex-direction:column; gap:18px;\" onsubmit=\"{{ handleSubmit }}\">\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px;\">\n          <div style=\"display:flex; flex-direction:column; gap:8px;\">\n            <label style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.14em; color:#9A8C74;\">YOUR NAME<\u002Flabel>\n            <input required=\"{{ true }}\" value=\"{{ form.name }}\" onchange=\"{{ setField('name') }}\" style=\"background:transparent; border:1px solid rgba(195,154,87,0.3); color:#EDE4D3; font-family:'Instrument Sans',sans-serif; font-size:15px; padding:13px 14px; outline:none;\" style-focus=\"border-color:#EBD3A2;\">\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:8px;\">\n            <label style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.14em; color:#9A8C74;\">FACILITY NAME<\u002Flabel>\n            <input required=\"{{ true }}\" value=\"{{ form.facility }}\" onchange=\"{{ setField('facility') }}\" style=\"background:transparent; border:1px solid rgba(195,154,87,0.3); color:#EDE4D3; font-family:'Instrument Sans',sans-serif; font-size:15px; padding:13px 14px; outline:none;\" style-focus=\"border-color:#EBD3A2;\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px;\">\n          <div style=\"display:flex; flex-direction:column; gap:8px;\">\n            <label style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.14em; color:#9A8C74;\">CITY<\u002Flabel>\n            <select value=\"{{ form.city }}\" onchange=\"{{ setField('city') }}\" style=\"background:#0C0A07; border:1px solid rgba(195,154,87,0.3); color:#EDE4D3; font-family:'Instrument Sans',sans-serif; font-size:15px; padding:13px 14px; outline:none;\">\n              <option value=\"\">Select city<\u002Foption>\n              <option value=\"Bengaluru\">Bengaluru<\u002Foption>\n              <option value=\"Chennai\">Chennai<\u002Foption>\n              <option value=\"Hyderabad\">Hyderabad<\u002Foption>\n              <option value=\"Kochi\">Kochi<\u002Foption>\n              <option value=\"Coimbatore\">Coimbatore<\u002Foption>\n              <option value=\"Other\">Other<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:8px;\">\n            <label style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.14em; color:#9A8C74;\">NUMBER OF RESIDENTS<\u002Flabel>\n            <input value=\"{{ form.beds }}\" onchange=\"{{ setField('beds') }}\" placeholder=\"e.g. 60\" style=\"background:transparent; border:1px solid rgba(195,154,87,0.3); color:#EDE4D3; font-family:'Instrument Sans',sans-serif; font-size:15px; padding:13px 14px; outline:none;\" style-focus=\"border-color:#EBD3A2;\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:8px;\">\n          <label style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.14em; color:#9A8C74;\">PHONE OR EMAIL<\u002Flabel>\n          <input required=\"{{ true }}\" value=\"{{ form.contact }}\" onchange=\"{{ setField('contact') }}\" style=\"background:transparent; border:1px solid rgba(195,154,87,0.3); color:#EDE4D3; font-family:'Instrument Sans',sans-serif; font-size:15px; padding:13px 14px; outline:none;\" style-focus=\"border-color:#EBD3A2;\">\n        <\u002Fdiv>\n        <button type=\"submit\" data-magnet=\"\" style=\"margin-top:8px; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.24em; color:#0C0A07; background:#EBD3A2; padding:17px 24px; border:none; cursor:pointer;\">REQUEST A CONVERSATION<\u002Fbutton>\n      <\u002Fform>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"border:1px solid rgba(195,154,87,0.22); background:#120E0A; padding:48px; display:flex; flex-direction:column; align-items:flex-start; gap:12px;\">\n        <div style=\"font-family:'Bodoni Moda',serif; font-size:24px; color:#EDE4D3;\">Thank you, {{ form.name }}.<\u002Fdiv>\n        <p style=\"font-size:15px; line-height:1.7; color:#9A8C74; margin:0;\">Someone from our team will reach out to {{ form.contact }} shortly to talk through {{ form.facility }}.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 09 FOOTER -->\n<footer data-screen-label=\"09 Footer\" style=\"position:relative; padding:60px 48px 40px; background:#0C0A07; border-top:1px solid rgba(195,154,87,0.14);\">\n  <div style=\"max-width:1240px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:24px;\">\n    <div>\n      <div style=\"font-family:'Bodoni Moda',serif; letter-spacing:0.2em; font-size:16px; color:#EDE4D3;\">DWELL<\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#6E6350; margin-top:8px;\">Dwell also protects the youngest — ambient safety for childcare, on the same platform.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:28px;\">\n      <a href=\"#approach\" style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.2em; color:#9A8C74;\">APPROACH<\u002Fa>\n      <a href=\"#features\" style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.2em; color:#9A8C74;\">FEATURES<\u002Fa>\n      <a href=\"#privacy\" style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.2em; color:#9A8C74;\">PRIVACY<\u002Fa>\n      <a href=\"#contact\" style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.2em; color:#9A8C74;\">CONTACT<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.1em; color:#4E4638;\">© MMXXVI DWELL<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    form: { name: '', facility: '', city: '', beds: '', contact: '' },\n    submitted: false,\n  };\n\n  componentDidMount() {\n    this._cleanup = [];\n    const ease = 'cubic-bezier(.16,1,.3,1)';\n    const io = new IntersectionObserver((es) => {\n      for (const e of es) {\n        if (e.isIntersecting) {\n          e.target.style.opacity = '1';\n          e.target.style.transform = 'none';\n          io.unobserve(e.target);\n        }\n      }\n    }, { threshold: 0.12 });\n    document.querySelectorAll('[data-reveal]').forEach((el) => {\n      if (el.getBoundingClientRect().top < window.innerHeight * 0.92) return;\n      const d = el.getAttribute('data-delay') || '0';\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(36px)';\n      el.style.transition = 'opacity 1.3s ' + ease + ' ' + d + 'ms, transform 1.3s ' + ease + ' ' + d + 'ms';\n      io.observe(el);\n    });\n    this._cleanup.push(() => io.disconnect());\n\n    document.querySelectorAll('[data-magnet]').forEach((el) => {\n      const move = (ev) => {\n        const r = el.getBoundingClientRect();\n        const dx = ev.clientX - (r.left + r.width / 2), dy = ev.clientY - (r.top + r.height / 2);\n        el.style.transform = 'translate(' + (dx * 0.12).toFixed(1) + 'px,' + (dy * 0.12).toFixed(1) + 'px)';\n      };\n      const out = () => { el.style.transform = 'translate(0,0)'; };\n      el.addEventListener('mousemove', move);\n      el.addEventListener('mouseleave', out);\n      this._cleanup.push(() => { el.removeEventListener('mousemove', move); el.removeEventListener('mouseleave', out); });\n    });\n  }\n  componentWillUnmount() {\n    (this._cleanup || []).forEach((f) => f());\n  }\n\n  setField = (key) => (e) => {\n    const val = e && e.target ? e.target.value : '';\n    this.setState((s) => ({ form: { ...s.form, [key]: val } }));\n  };\n\n  handleSubmit = (e) => {\n    if (e && e.preventDefault) e.preventDefault();\n    this.setState({ submitted: true });\n  };\n\n  renderVals() {\n    const features = [\n      { num: 'I', title: 'Contactless fall detection', desc: 'Radar senses a fall in the bathroom or bedroom the instant it happens — no camera, no wearable required.', stat: 'Up to 80% of falls happen in the bathroom or bedroom', tag: 'Industry benchmark', tagColor: '#9FE8DC' },\n      { num: 'II', title: 'Contactless vital-signs monitoring', desc: 'Breathing and heart rate tracked through the air, flagging deterioration hours before it becomes an emergency.', stat: 'Hours of advance warning before a critical event', tag: 'Peer-reviewed study', tagColor: '#EBD3A2' },\n      { num: 'III', title: 'Safe wandering support', desc: 'Gentle geofencing for residents with dementia — freedom within safe boundaries, not a locked door.', stat: 'Unsupervised exits caught without confinement', tag: 'How Dwell works', tagColor: '#9A8C74' },\n      { num: 'IV', title: 'Early decline detection', desc: 'Subtle shifts in movement and routine can flag infections like UTIs days before symptoms are obvious.', stat: 'Days of early warning from activity patterns', tag: 'Peer-reviewed study', tagColor: '#EBD3A2' },\n      { num: 'V', title: 'Smart nurse-call coordination', desc: 'Alerts are triaged and routed to the right staff member, cutting the noise that leads to alarm fatigue.', stat: 'Meaningfully fewer false alarms per shift', tag: 'Industry benchmark', tagColor: '#9FE8DC' },\n      { num: 'VI', title: 'Environmental monitoring', desc: 'The same sensor network watching air quality and humidity also tracks water and energy use across the facility.', stat: 'One platform, comfort and utility savings together', tag: 'How Dwell works', tagColor: '#9A8C74' },\n      { num: 'VII', title: 'Medication management', desc: 'Dose reminders and confirmation, with real-time visibility for family members who ask.', stat: 'Zero missed doses, visible to family', tag: 'How Dwell works', tagColor: '#9A8C74' },\n      { num: 'VIII', title: 'Social & cognitive engagement', desc: \"Wellbeing isn't just safety — activity nudges and engagement tracking round out the picture of a good day.\", stat: 'The wellbeing half of the safety story', tag: 'How Dwell works', tagColor: '#9A8C74' },\n    ];\n\n    const privacyPoints = [\n      { tag: '01', title: 'No cameras in private rooms, ever', desc: 'Not a policy setting — a hardware fact. Bathrooms and bedrooms are never captured as images or video, full stop.' },\n      { tag: '02', title: 'Data processed close to the source', desc: \"Sensing happens on-site wherever possible, so raw signals aren't shipped further than they need to be.\" },\n      { tag: '03', title: 'The facility owns the data', desc: 'Dwell is a custodian, not an owner. Your records stay yours, exportable and deletable on your terms.' },\n      { tag: '04', title: 'Role-based access', desc: 'Staff see what they need to respond. Family sees wellbeing summaries. No one sees more than their role requires.' },\n      { tag: '05', title: 'A finite retention window', desc: 'Data is kept only for a stated, limited period — a real deadline, not a vague industry norm.' },\n      { tag: '06', title: 'Consent that can be withdrawn', desc: 'Residents and families opt in, and can opt out, at any time — no penalty, no friction.' },\n    ];\n\n    const audiences = [\n      { label: 'FOR RESIDENTS', points: ['Privacy in the rooms that matter most', 'Freedom to move without a lens overhead', \"Faster help, exactly when it's needed\"] },\n      { label: 'FOR FAMILIES', points: ['Peace of mind without a camera feed to watch', 'Wellbeing updates, not surveillance footage', \"Confidence their parent is truly looked after\"] },\n      { label: 'FOR STAFF', points: ['Fewer false alarms, less alarm fatigue', 'Response-time data that backs their work', 'More time on care, less time on checks'] },\n    ];\n\n    return {\n      features,\n      privacyPoints,\n      audiences,\n      form: this.state.form,\n      submitted: this.state.submitted,\n      setField: this.setField,\n      handleSubmit: this.handleSubmit,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
