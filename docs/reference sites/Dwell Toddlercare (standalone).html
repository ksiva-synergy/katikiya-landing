  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

taLabel }}<\u002Fa>\n  <\u002Fheader>\n\n  <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:60px 24px 40px;position:relative;z-index:2;\">\n    <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.38em;color:#9A8C74;margin-bottom:32px;\">FOR DAYCARE &amp; PLAYSCHOOL OWNERS — SOUTH INDIA<\u002Fdiv>\n    <h1 data-reveal=\"\" data-delay=\"120\" style=\"font-family:'Bodoni Moda',serif;font-weight:400;font-size:clamp(48px,8.5vw,116px);line-height:1.05;margin:0;letter-spacing:-0.01em;max-width:1100px;\">Monitoring,<br>not <em style=\"font-style:italic;color:{{ accentColorLight }};\">surveillance.<\u002Fem><\u002Fh1>\n    <p data-reveal=\"\" data-delay=\"260\" style=\"max-width:600px;font-size:18px;line-height:1.75;color:#B7A98E;margin:38px 0 44px;\">Turn the safety spotlight now on daycares into an enrollment advantage — without turning your centre into a fishbowl. Camera-free sensing where it matters most, consent-gated viewing where parents want it, and the compliance work already done.<\u002Fp>\n    <div data-reveal=\"\" data-delay=\"380\" style=\"display:flex;gap:20px;align-items:center;flex-wrap:wrap;justify-content:center;\">\n      <a href=\"#founding\" data-magnet=\"\" style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.28em;color:#0C0A07;background:{{ accentColorLight }};padding:19px 34px;border-radius:2px;display:inline-block;\">{{ primaryCtaLabel }}<\u002Fa>\n      <a href=\"#the-system\" style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.24em;color:#EBD3A2;border-bottom:1px solid rgba(195,154,87,0.4);padding-bottom:6px;\">SEE HOW IT WORKS ↓<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-reveal=\"\" data-delay=\"440\" style=\"position:relative;z-index:2;padding:0 0 40px;overflow:hidden;\">\n    <div style=\"text-align:center;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.32em;color:#6E6350;margin-bottom:18px;\">NOW ONBOARDING FOUNDING CENTRES ACROSS<\u002Fdiv>\n    <div style=\"display:flex;justify-content:center;gap:clamp(20px,4vw,48px);flex-wrap:wrap;padding:0 24px;\">\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.16em;color:#9FE8DC;\">CHENNAI<\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.16em;color:#9FE8DC;\">BENGALURU<\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.16em;color:#9FE8DC;\">KOCHI<\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.16em;color:#9FE8DC;\">HYDERABAD<\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.16em;color:#9FE8DC;\">THIRUVANANTHAPURAM<\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.16em;color:#9FE8DC;\">VISAKHAPATNAM<\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.16em;color:#9FE8DC;\">COIMBATORE<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div id=\"why-now\" data-screen-label=\"02 Why Now\" style=\"position:relative;padding:18vh 24px 16vh;background:#0C0A07;\">\n  <div style=\"max-width:840px;margin:0 auto;text-align:center;\">\n    <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.4em;color:#6E6350;margin-bottom:28px;\">THE MOMENT — WHY NOW<\u002Fdiv>\n    <h2 data-reveal=\"\" data-delay=\"100\" style=\"font-family:'Bodoni Moda',serif;font-weight:400;font-size:clamp(34px,4.6vw,60px);line-height:1.25;margin:0 0 36px;\">The rules are catching up to what parents already expect.<\u002Fh2>\n    <p data-reveal=\"\" data-delay=\"200\" style=\"font-size:17px;line-height:1.9;color:#B7A98E;margin:0 0 24px;text-align:left;\">A high-profile abuse case at a Bengaluru daycare this June pushed Karnataka's child rights commission to start drafting a Standard Operating Procedure that would require CCTV with live parent access at every centre in the state. Whatever the final shape of that SOP, the direction is clear — and every owner across Chennai, Bengaluru, Kochi, Hyderabad, Thiruvananthapuram, Visakhapatnam and Coimbatore already feels it.<\u002Fp>\n    <p data-reveal=\"\" data-delay=\"260\" style=\"font-size:17px;line-height:1.9;color:#B7A98E;margin:0 0 24px;text-align:left;\">Right now the choices are blunt. Generic CCTV resellers install lenses with no safety intelligence behind them. Attendance apps bolt a camera feed on as an afterthought. Neither was built for what you actually need: a way to show parents you take their trust seriously, without turning every nap room into a live broadcast your staff have to perform for all day.<\u002Fp>\n    <p data-reveal=\"\" data-delay=\"320\" style=\"font-size:17px;line-height:1.9;color:#EBD3A2;margin:0;text-align:left;font-style:italic;\">The centres that get ahead of this decide how transparency shows up in their rooms. The ones that wait have it decided for them.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div id=\"the-system\" data-screen-label=\"03 The Layered System\" style=\"position:relative;padding:16vh 0 14vh;background:#120E0A;border-top:1px solid rgba(195,154,87,0.14);border-bottom:1px solid rgba(195,154,87,0.14);\">\n  <div style=\"max-width:1240px;margin:0 auto;padding:0 48px;\">\n    <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.4em;color:#6E6350;margin-bottom:24px;\">THE SYSTEM — ONE LAYERED PLATFORM<\u002Fdiv>\n    <h2 data-reveal=\"\" data-delay=\"100\" style=\"font-family:'Bodoni Moda',serif;font-weight:400;font-size:clamp(38px,5vw,72px);line-height:1.1;margin:0 0 24px;max-width:820px;\">Six signals.<br><em style=\"font-style:italic;color:{{ accentColorLight }};\">One dashboard.<\u002Fem><\u002Fh2>\n    <p data-reveal=\"\" data-delay=\"180\" style=\"max-width:560px;font-size:16px;line-height:1.8;color:#B7A98E;margin:0;\">Cameras where they help. Sensors where they don't. You choose the mix, room by room.<\u002Fp>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1240px;margin:9vh auto 0;padding:0 48px;display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:1px;background:rgba(195,154,87,0.14);border:1px solid rgba(195,154,87,0.14);\">\n\n    <div data-reveal=\"\" style=\"background:#120E0A;padding:36px;display:flex;flex-direction:column;\">\n      <div style=\"position:relative;width:76px;height:76px;margin-bottom:28px;\">\n        <div style=\"position:absolute;inset:0;border-radius:50%;border:1px solid rgba(195,154,87,0.3);\"><\u002Fdiv>\n        <div style=\"position:absolute;inset:14px;border-radius:50%;border:1px solid rgba(159,232,220,0.35);\"><\u002Fdiv>\n        <div style=\"position:absolute;left:50%;top:50%;width:10px;height:10px;border-radius:50%;background:#9FE8DC;transform:translate(-50%,-50%);animation:dwBreathe 4s ease-in-out infinite;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.3em;color:#6E6350;margin-bottom:12px;\">I / NAP &amp; REST<\u002Fdiv>\n      <div style=\"font-family:'Bodoni Moda',serif;font-size:25px;line-height:1.3;margin-bottom:12px;\">Rest-area safety, without a camera in the room.<\u002Fdiv>\n      <p style=\"font-size:14px;line-height:1.75;color:#9A8C74;margin:0;\">Motion and breathing sensing (the same approach proven across tens of thousands of Japanese daycare classrooms) alerts staff the moment a child stops moving or settles into an unsafe position — no lens pointed at sleeping toddlers, ever.<\u002Fp>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" data-delay=\"60\" style=\"background:#120E0A;padding:36px;display:flex;flex-direction:column;\">\n      <div style=\"position:relative;width:76px;height:76px;margin-bottom:28px;\">\n        <div style=\"position:absolute;left:50%;top:8px;width:34px;height:22px;border:2px solid rgba(195,154,87,0.5);border-bottom:none;border-radius:17px 17px 0 0;transform:translateX(-50%);\"><\u002Fdiv>\n        <div style=\"position:absolute;left:50%;top:26px;width:52px;height:38px;background:rgba(195,154,87,0.14);border:1px solid rgba(195,154,87,0.4);border-radius:4px;transform:translateX(-50%);\"><\u002Fdiv>\n        <div style=\"position:absolute;left:50%;top:44px;width:6px;height:6px;border-radius:50%;background:#EBD3A2;transform:translateX(-50%);\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.3em;color:#6E6350;margin-bottom:12px;\">II / LIVE VIEWING<\u002Fdiv>\n      <div style=\"font-family:'Bodoni Moda',serif;font-size:25px;line-height:1.3;margin-bottom:12px;\">Parent viewing, gated by consent — on your terms.<\u002Fdiv>\n      <p style=\"font-size:14px;line-height:1.75;color:#9A8C74;margin:0;\">Not an always-open feed. You set the viewing hours, video is video-only with no audio, parents can't screenshot or download, every view is logged, and nothing is archived past the retention window you choose.<\u002Fp>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" data-delay=\"120\" style=\"background:#120E0A;padding:36px;display:flex;flex-direction:column;\">\n      <div style=\"position:relative;width:76px;height:76px;margin-bottom:28px;\">\n        <div style=\"position:absolute;left:12px;top:12px;width:14px;height:14px;border-radius:50%;background:rgba(159,232,220,0.5);\"><\u002Fdiv>\n        <div style=\"position:absolute;right:12px;top:12px;width:10px;height:10px;border-radius:50%;background:rgba(195,154,87,0.4);\"><\u002Fdiv>\n        <div style=\"position:absolute;left:12px;bottom:12px;width:8px;height:8px;border-radius:50%;background:rgba(195,154,87,0.3);\"><\u002Fdiv>\n        <div style=\"position:absolute;right:14px;bottom:16px;width:16px;height:16px;border-radius:50%;background:rgba(159,232,220,0.35);\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.3em;color:#6E6350;margin-bottom:12px;\">III / ENVIRONMENT<\u002Fdiv>\n      <div style=\"font-family:'Bodoni Moda',serif;font-size:25px;line-height:1.3;margin-bottom:12px;\">Problems caught before they become incidents.<\u002Fdiv>\n      <p style=\"font-size:14px;line-height:1.75;color:#9A8C74;margin:0;\">Air quality (CO₂, PM2.5), temperature, water safety and door/entry sensors run quietly in the background — invisible to children and parents, but a real upgrade to your safety and liability position.<\u002Fp>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" style=\"background:#120E0A;padding:36px;display:flex;flex-direction:column;\">\n      <div style=\"position:relative;width:76px;height:76px;margin-bottom:28px;\">\n        <div style=\"position:absolute;left:14px;top:16px;width:16px;height:16px;border-radius:50%;background:#E0A450;\"><\u002Fdiv>\n        <div style=\"position:absolute;left:9px;top:11px;width:26px;height:26px;border-radius:50%;border:1px dashed rgba(224,164,80,0.5);\"><\u002Fdiv>\n        <div style=\"position:absolute;right:14px;bottom:14px;width:14px;height:14px;border-radius:50%;border:1px solid rgba(195,154,87,0.4);\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.3em;color:#6E6350;margin-bottom:12px;\">IV / RATIO &amp; SUPERVISION<\u002Fdiv>\n      <div style=\"font-family:'Bodoni Moda',serif;font-size:25px;line-height:1.3;margin-bottom:12px;\">The one alert that matters most, in real time.<\u002Fdiv>\n      <p style=\"font-size:14px;line-height:1.75;color:#9A8C74;margin:0;\">An instant alert if a room has children present but no staff member with them, plus continuous staff-to-child ratio tracking you can hand a licensing inspector without scrambling for a spreadsheet.<\u002Fp>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" data-delay=\"60\" style=\"background:#120E0A;padding:36px;display:flex;flex-direction:column;\">\n      <div style=\"position:relative;width:76px;height:76px;margin-bottom:28px;\">\n        <div style=\"position:absolute;left:50%;top:50%;width:22px;height:22px;border-radius:50%;background:{{ accentColorLight }};transform:translate(-50%,-50%);\"><\u002Fdiv>\n        <div style=\"position:absolute;left:50%;top:50%;width:22px;height:22px;border-radius:50%;border:1px solid {{ accentColorLight }};transform:translate(-50%,-50%);animation:dwPulseRing 2.4s ease-out infinite;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.3em;color:#6E6350;margin-bottom:12px;\">V / PANIC BUTTON<\u002Fdiv>\n      <div style=\"font-family:'Bodoni Moda',serif;font-size:25px;line-height:1.3;margin-bottom:12px;\">One press, precisely located, instantly escalated.<\u002Fdiv>\n      <p style=\"font-size:14px;line-height:1.75;color:#9A8C74;margin:0;\">Staff trigger a panic alert for a medical or security emergency and it reaches the right people — on-site leads, your emergency contacts — with the exact room attached, no fumbling for a phone number.<\u002Fp>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" data-delay=\"120\" style=\"background:#120E0A;padding:36px;display:flex;flex-direction:column;\">\n      <div style=\"position:relative;width:76px;height:76px;margin-bottom:28px;\">\n        <div style=\"position:absolute;left:22px;top:10px;width:32px;height:44px;border:1px solid rgba(195,154,87,0.4);border-radius:2px;\"><\u002Fdiv>\n        <div style=\"position:absolute;left:28px;top:20px;width:20px;height:2px;background:rgba(195,154,87,0.35);\"><\u002Fdiv>\n        <div style=\"position:absolute;left:28px;top:28px;width:20px;height:2px;background:rgba(195,154,87,0.35);\"><\u002Fdiv>\n        <div style=\"position:absolute;left:28px;top:36px;width:12px;height:2px;background:rgba(195,154,87,0.35);\"><\u002Fdiv>\n        <div style=\"position:absolute;left:24px;top:46px;width:14px;height:8px;border-left:2px solid #9FE8DC;border-bottom:2px solid #9FE8DC;transform:rotate(-45deg);\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.3em;color:#6E6350;margin-bottom:12px;\">VI / COMPLIANCE<\u002Fdiv>\n      <div style=\"font-family:'Bodoni Moda',serif;font-size:25px;line-height:1.3;margin-bottom:12px;\">Built in, not bolted on.<\u002Fdiv>\n      <p style=\"font-size:14px;line-height:1.75;color:#9A8C74;margin:0;\">Consent capture, data minimization, defined retention windows, encryption and audit logs — designed around DPDPA 2023 and the 2025 Rules for children's data, so you're never explaining your setup to a worried parent or a regulator alone.<\u002Fp>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div data-screen-label=\"04 Owner Control\" style=\"position:relative;padding:18vh 24px;background:#0C0A07;\">\n  <div style=\"max-width:1120px;margin:0 auto;display:grid;grid-template-columns:minmax(280px,0.85fr) minmax(340px,1.15fr);gap:clamp(48px,7vw,100px);align-items:center;\">\n    <div>\n      <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.4em;color:#6E6350;margin-bottom:24px;\">HOW IT RUNS — YOU DECIDE<\u002Fdiv>\n      <h2 data-reveal=\"\" data-delay=\"100\" style=\"font-family:'Bodoni Moda',serif;font-weight:400;font-size:clamp(34px,4vw,54px);line-height:1.18;margin:0 0 28px;\">Built for how your centre already runs.<\u002Fh2>\n      <p data-reveal=\"\" data-delay=\"180\" style=\"font-size:16px;line-height:1.85;color:#B7A98E;margin:0 0 20px;max-width:440px;\">Which rooms carry a camera, which stay sensor-only, and when parents can watch — every setting stays with you, not with us or with a blanket policy.<\u002Fp>\n      <p data-reveal=\"\" data-delay=\"240\" style=\"font-size:14px;line-height:1.8;color:#6E6350;margin:0;max-width:440px;\">Try the room settings — nap and diapering areas stay locked to camera-free sensing by design.<\u002Fp>\n    <\u002Fdiv>\n    <div data-reveal=\"\" data-delay=\"120\" style=\"border:1px solid rgba(195,154,87,0.2);background:#120E0A;padding:clamp(24px,3vw,40px);\">\n      <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.3em;color:#9A8C74;\">ROOM SETTINGS<\u002Fdiv>\n        <div style=\"display:flex;gap:8px;\">\n          <button onclick=\"{{ setPreset0 }}\" style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.16em;padding:8px 12px;border-radius:2px;cursor:pointer;background:{{ preset0Bg }};color:{{ preset0Fg }};border:1px solid rgba(195,154,87,0.3);\">SCHOOL HOURS<\u002Fbutton>\n          <button onclick=\"{{ setPreset1 }}\" style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.16em;padding:8px 12px;border-radius:2px;cursor:pointer;background:{{ preset1Bg }};color:{{ preset1Fg }};border:1px solid rgba(195,154,87,0.3);\">FULL DAY<\u002Fbutton>\n          <button onclick=\"{{ setPreset2 }}\" style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.16em;padding:8px 12px;border-radius:2px;cursor:pointer;background:{{ preset2Bg }};color:{{ preset2Fg }};border:1px solid rgba(195,154,87,0.3);\">VIEWING OFF<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#9FE8DC;margin-bottom:24px;\">LIVE VIEWING WINDOW — {{ viewingWindowLabel }}<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:1px;background:rgba(195,154,87,0.14);border:1px solid rgba(195,154,87,0.14);\">\n        <sc-for list=\"{{ rooms }}\" as=\"room\" hint-placeholder-count=\"5\">\n          <div style=\"background:#0E0B08;padding:16px 18px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;\">\n            <div>\n              <div style=\"font-size:14px;color:#EDE4D3;margin-bottom:3px;\">{{ room.name }}<\u002Fdiv>\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.16em;color:{{ room.labelColor }};\">{{ room.modeLabel }}<\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{ room.toggle }}\" disabled=\"{{ room.locked }}\" style=\"width:52px;height:28px;border-radius:14px;border:1px solid rgba(195,154,87,0.35);background:{{ room.trackColor }};position:relative;cursor:{{ room.cursor }};opacity:{{ room.opacity }};flex-shrink:0;\">\n              <span style=\"position:absolute;top:2px;left:{{ room.knobLeft }};width:22px;height:22px;border-radius:50%;background:#EDE4D3;transition:left .25s;\"><\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div id=\"trust\" data-screen-label=\"05 Trust and Compliance\" style=\"position:relative;padding:18vh 0;background:#120E0A;border-top:1px solid rgba(195,154,87,0.14);border-bottom:1px solid rgba(195,154,87,0.14);\">\n  <div style=\"max-width:1120px;margin:0 auto;padding:0 48px;\">\n    <div style=\"max-width:640px;margin-bottom:9vh;\">\n      <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.4em;color:#6E6350;margin-bottom:24px;\">TRUST &amp; COMPLIANCE<\u002Fdiv>\n      <h2 data-reveal=\"\" data-delay=\"100\" style=\"font-family:'Bodoni Moda',serif;font-weight:400;font-size:clamp(34px,4.4vw,58px);line-height:1.18;margin:0 0 24px;\">The compliance work, done before you need it.<\u002Fh2>\n      <p data-reveal=\"\" data-delay=\"180\" style=\"font-size:16px;line-height:1.85;color:#B7A98E;margin:0;\">Every promise below is plain-language and DPDPA-ready — so when a parent or a regulator asks, you already have the answer.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1px;background:rgba(195,154,87,0.14);border:1px solid rgba(195,154,87,0.14);\">\n      <div data-reveal=\"\" style=\"background:#120E0A;padding:28px;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.2em;color:#9FE8DC;margin-bottom:12px;\">VERIFIABLE CONSENT<\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.7;color:#9A8C74;margin:0;\">Every parent explicitly opts in before viewing access opens — no default-on cameras, ever.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-delay=\"60\" style=\"background:#120E0A;padding:28px;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.2em;color:#9FE8DC;margin-bottom:12px;\">DATA MINIMIZATION<\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.7;color:#9A8C74;margin:0;\">We collect what keeps children safe and nothing else — no behavioral profiling, no tracking.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-delay=\"120\" style=\"background:#120E0A;padding:28px;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.2em;color:#9FE8DC;margin-bottom:12px;\">DEFINED RETENTION<\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.7;color:#9A8C74;margin:0;\">A stated retention window, set by you — footage and sensor logs don't live anywhere forever.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"background:#120E0A;padding:28px;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.2em;color:#9FE8DC;margin-bottom:12px;\">ENCRYPTION THROUGHOUT<\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.7;color:#9A8C74;margin:0;\">Streams and stored data are encrypted end to end, on-site and in transit.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-delay=\"60\" style=\"background:#120E0A;padding:28px;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.2em;color:#9FE8DC;margin-bottom:12px;\">AUDIT LOGS<\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.7;color:#9A8C74;margin:0;\">Every view, export and access attempt is logged and available to you, in full.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-delay=\"120\" style=\"background:#120E0A;padding:28px;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.2em;color:#9FE8DC;margin-bottom:12px;\">NO ADS. NO DATA SALE.<\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.7;color:#9A8C74;margin:0;\">A child's data is never monetized, shared, or used to target anyone, ever.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div id=\"founding\" data-screen-label=\"06 Founding Cohort\" style=\"position:relative;padding:20vh 0;background:#0C0A07;\">\n  <div style=\"max-width:1240px;margin:0 auto;padding:0 48px;display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:clamp(48px,8vw,120px);align-items:start;\">\n    <div>\n      <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.4em;color:#6E6350;margin-bottom:24px;\">SOCIAL PROOF — HONESTLY, EARLY<\u002Fdiv>\n      <h2 data-reveal=\"\" data-delay=\"100\" style=\"font-family:'Bodoni Moda',serif;font-weight:400;font-size:clamp(34px,4.4vw,58px);line-height:1.2;margin:0 0 28px;\">Early, and building in the open.<\u002Fh2>\n      <p data-reveal=\"\" data-delay=\"180\" style=\"font-size:16px;line-height:1.85;color:#B7A98E;margin:0 0 20px;max-width:460px;\">Dwell is now onboarding its first founding partner centres across Chennai, Bengaluru, Kochi, Hyderabad, Thiruvananthapuram, Visakhapatnam and Coimbatore. No inflated centre counts, no invented testimonials — just an open build process with the owners who join first.<\u002Fp>\n      <p data-reveal=\"\" data-delay=\"240\" style=\"font-size:16px;line-height:1.85;color:#B7A98E;margin:0;max-width:460px;\">Founding partners help shape the room-by-room defaults, get priority installation, and lock in founding pricing ahead of general availability.<\u002Fp>\n    <\u002Fdiv>\n    <div data-reveal=\"\" data-delay=\"150\" style=\"border:1px solid rgba(195,154,87,0.22);padding:clamp(32px,4vw,52px);background:#120E0A;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.34em;color:#C39A57;margin-bottom:20px;\">FOUNDING PARTNER COHORT<\u002Fdiv>\n      <div style=\"font-family:'Bodoni Moda',serif;font-size:clamp(22px,2.2vw,30px);line-height:1.35;margin-bottom:16px;\">{{ foundingHeadline }}<\u002Fdiv>\n      <p style=\"font-size:14px;line-height:1.75;color:#9A8C74;margin:0 0 32px;\">Tell us a little about your centre. We'll set up a walkthrough — no obligation, no hard sell.<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <input type=\"text\" placeholder=\"Centre name\" style=\"background:transparent;border:1px solid rgba(195,154,87,0.3);color:#EDE4D3;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:0.04em;padding:16px 18px;outline:none;\" style-focus=\"border-color:#EBD3A2;\">\n        <input type=\"text\" placeholder=\"City\" style=\"background:transparent;border:1px solid rgba(195,154,87,0.3);color:#EDE4D3;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:0.04em;padding:16px 18px;outline:none;\" style-focus=\"border-color:#EBD3A2;\">\n        <input type=\"email\" placeholder=\"your@centre.com\" style=\"background:transparent;border:1px solid rgba(195,154,87,0.3);color:#EDE4D3;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:0.04em;padding:16px 18px;outline:none;\" style-focus=\"border-color:#EBD3A2;\">\n        <button data-magnet=\"\" style=\"background:{{ accentColorLight }};color:#0C0A07;border:none;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.3em;padding:18px;cursor:pointer;\">{{ primaryCtaLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.22em;color:#6E6350;margin-top:20px;\">PRICING SHARED ON THE CALL. NO OBLIGATION.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div id=\"pricing\" data-screen-label=\"07 Pricing\" style=\"position:relative;padding:18vh 24px;text-align:center;background:#120E0A;border-top:1px solid rgba(195,154,87,0.14);\">\n  <div style=\"max-width:760px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.4em;color:#6E6350;margin-bottom:28px;\">PRICING — SIMPLE BY DESIGN<\u002Fdiv>\n    <h2 data-reveal=\"\" data-delay=\"100\" style=\"font-family:'Bodoni Moda',serif;font-weight:400;font-size:clamp(32px,4.4vw,58px);line-height:1.2;margin:0 0 20px;\">One number, per child, per month.<\u002Fh2>\n    <p data-reveal=\"\" data-delay=\"180\" style=\"font-size:16px;line-height:1.85;color:#B7A98E;margin:0 0 8vh;max-width:520px;margin-left:auto;margin-right:auto;\">No enterprise quotes. No hidden tiers. Final pricing depends on your centre's rooms and room mix — we'll walk through it together.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1px;background:rgba(195,154,87,0.14);border:1px solid rgba(195,154,87,0.14);text-align:left;\">\n      <div data-reveal=\"\" style=\"background:#0E0B08;padding:28px;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.24em;color:#6E6350;margin-bottom:14px;\">STRUCTURE<\u002Fdiv>\n        <div style=\"font-family:'Bodoni Moda',serif;font-size:22px;\">₹ per child, per month<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-delay=\"60\" style=\"background:#0E0B08;padding:28px;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.24em;color:#6E6350;margin-bottom:14px;\">INSTALLATION<\u002Fdiv>\n        <div style=\"font-family:'Bodoni Moda',serif;font-size:22px;\">Included, on-site<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-delay=\"120\" style=\"background:#0E0B08;padding:28px;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.24em;color:#6E6350;margin-bottom:14px;\">EXACT NUMBER<\u002Fdiv>\n        <div style=\"font-family:'Bodoni Moda',serif;font-size:22px;\">Shared on your walkthrough call<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div data-screen-label=\"08 Final CTA and Footer\" style=\"position:relative;padding:20vh 24px 60px;text-align:center;background:#0C0A07;overflow:hidden;\">\n  <div style=\"position:absolute;left:50%;top:-30vh;width:110vw;height:60vh;border-radius:50%;background:radial-gradient(ellipse at center, rgba(195,154,87,0.1) 0%, rgba(12,10,7,0) 65%);transform:translateX(-50%);pointer-events:none;\"><\u002Fdiv>\n  <div data-reveal=\"\" style=\"font-family:'Bodoni Moda',serif;font-size:clamp(32px,5vw,64px);line-height:1.25;font-weight:400;position:relative;max-width:760px;margin:0 auto;\">Your centre already keeps children safe.<br>Let's help you <em style=\"font-style:italic;color:{{ accentColorLight }};\">show<\u002Fem> it.<\u002Fdiv>\n  <div data-reveal=\"\" data-delay=\"160\" style=\"margin-top:56px;\">\n    <a href=\"#founding\" data-magnet=\"\" style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.3em;color:#0C0A07;background:{{ accentColorLight }};padding:20px 38px;border-radius:2px;display:inline-block;\">{{ primaryCtaLabel }}<\u002Fa>\n  <\u002Fdiv>\n  <div data-reveal=\"\" data-delay=\"260\" style=\"display:flex;justify-content:center;gap:clamp(24px,4vw,56px);margin-top:80px;flex-wrap:wrap;\">\n    <div style=\"font-family:'Bodoni Moda',serif;font-size:20px;letter-spacing:0.28em;\">DWELL<\u002Fdiv>\n    <a href=\"#why-now\" style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.24em;color:#9A8C74;\">WHY NOW<\u002Fa>\n    <a href=\"#the-system\" style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.24em;color:#9A8C74;\">THE SYSTEM<\u002Fa>\n    <a href=\"#trust\" style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.24em;color:#9A8C74;\">TRUST<\u002Fa>\n    <a href=\"#pricing\" style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.24em;color:#9A8C74;\">PRICING<\u002Fa>\n  <\u002Fdiv>\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.2em;color:#4E4638;margin-top:56px;\">Dwell is built by Katikiya. · © MMXXVI<\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#EBD3A2&quot;,&quot;options&quot;:[&quot;#EBD3A2&quot;,&quot;#9FE8DC&quot;,&quot;#E0A450&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Look&quot;},&quot;primaryCtaLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;BOOK A WALKTHROUGH&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Copy&quot;},&quot;foundingHeadline&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;A handful of centres will shape how this works.&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Copy&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    rooms: [\n      { id: 0, name: 'Nap &amp; Rest Room', locked: true, mode: 'sensor' },\n      { id: 1, name: 'Diapering / Restroom', locked: true, mode: 'sensor' },\n      { id: 2, name: 'Toddler Classroom', locked: false, mode: 'both' },\n      { id: 3, name: 'Entrance &amp; Foyer', locked: false, mode: 'both' },\n      { id: 4, name: 'Outdoor Play Yard', locked: false, mode: 'sensor' }\n    ],\n    viewingPreset: 0\n  };\n\n  componentDidMount() {\n    this._cleanup = [];\n    const ease = 'cubic-bezier(.16,1,.3,1)';\n    const io = new IntersectionObserver((es) => {\n      for (const e of es) {\n        if (e.isIntersecting) {\n          e.target.style.opacity = '1';\n          e.target.style.transform = 'none';\n          io.unobserve(e.target);\n        }\n      }\n    }, { threshold: 0.15 });\n    document.querySelectorAll('[data-reveal]').forEach((el) => {\n      if (el.getBoundingClientRect().top < window.innerHeight * 0.92) return;\n      const d = el.getAttribute('data-delay') || '0';\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(40px)';\n      el.style.transition = 'opacity 1.4s ' + ease + ' ' + d + 'ms, transform 1.4s ' + ease + ' ' + d + 'ms';\n      io.observe(el);\n    });\n    this._cleanup.push(() => io.disconnect());\n\n    document.querySelectorAll('[data-magnet]').forEach((el) => {\n      const move = (ev) => {\n        const r = el.getBoundingClientRect();\n        const dx = ev.clientX - (r.left + r.width / 2), dy = ev.clientY - (r.top + r.height / 2);\n        el.style.transform = 'translate(' + (dx * 0.12).toFixed(1) + 'px,' + (dy * 0.12).toFixed(1) + 'px)';\n      };\n      const out = () => { el.style.transform = 'translate(0,0)'; };\n      el.addEventListener('mousemove', move);\n      el.addEventListener('mouseleave', out);\n      this._cleanup.push(() => { el.removeEventListener('mousemove', move); el.removeEventListener('mouseleave', out); });\n    });\n  }\n  componentWillUnmount() {\n    (this._cleanup || []).forEach((f) => f());\n  }\n\n  _accent() { return this.props.accentColor ?? '#EBD3A2'; }\n\n  toggleRoom(id) {\n    this.setState((s) => ({\n      rooms: s.rooms.map((r) => r.id === id && !r.locked ? { ...r, mode: r.mode === 'both' ? 'sensor' : 'both' } : r)\n    }));\n  }\n\n  renderVals() {\n    const accent = this._accent();\n    const presetLabels = ['7:00 AM \\u2013 6:30 PM', '6:30 AM \\u2013 8:00 PM', 'CLOSED — SENSORS ONLY'];\n    const rooms = this.state.rooms.map((r) => {\n      const on = r.mode === 'both';\n      return {\n        id: r.id,\n        name: r.name,\n        modeLabel: r.locked ? 'LOCKED — SENSOR ONLY' : (on ? 'CAMERA + SENSORS' : 'SENSORS ONLY'),\n        labelColor: r.locked ? '#6E6350' : (on ? '#9FE8DC' : '#9A8C74'),\n        toggle: () => this.toggleRoom(r.id),\n        locked: r.locked,\n        cursor: r.locked ? 'not-allowed' : 'pointer',\n        opacity: r.locked ? 0.5 : 1,\n        trackColor: on ? 'rgba(159,232,220,0.28)' : 'rgba(154,140,116,0.16)',\n        knobLeft: on ? '26px' : '2px'\n      };\n    });\n    const preset = this.state.viewingPreset;\n    const presetBg = (i) => preset === i ? accent : 'transparent';\n    const presetFg = (i) => preset === i ? '#0C0A07' : '#9A8C74';\n    return {\n      accentColorLight: accent,\n      primaryCtaLabel: this.props.primaryCtaLabel ?? 'BOOK A WALKTHROUGH',\n      foundingHeadline: this.props.foundingHeadline ?? 'A handful of centres will shape how this works.',\n      rooms,\n      viewingWindowLabel: presetLabels[preset],\n      setPreset0: () => this.setState({ viewingPreset: 0 }),\n      setPreset1: () => this.setState({ viewingPreset: 1 }),\n      setPreset2: () => this.setState({ viewingPreset: 2 }),\n      preset0Bg: presetBg(0), preset0Fg: presetFg(0),\n      preset1Bg: presetBg(1), preset1Fg: presetFg(1),\n      preset2Bg: presetBg(2), preset2Fg: presetFg(2)\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
