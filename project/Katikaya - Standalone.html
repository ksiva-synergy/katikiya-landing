document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-content:space-between;align-items:center;padding:36px 48px;position:relative;z-index:2;\">\n    <div style=\"font-family:'Bodoni Moda',serif;font-size:20px;letter-spacing:0.34em;font-weight:500;\">KATIKAYA<\u002Fdiv>\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.3em;color:#9A8C74;\">EST. MMXXVI — THE INTELLIGENT DWELLING<\u002Fdiv>\n  <\u002Fheader>\n\n  <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:0 24px;position:relative;z-index:2;\">\n    <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.42em;color:#9A8C74;margin-bottom:36px;\">A HOME THAT KNOWS ITSELF<\u002Fdiv>\n    <h1 data-reveal=\"\" data-delay=\"120\" style=\"font-family:'Bodoni Moda',serif;font-weight:400;font-size:clamp(64px, 10vw, 156px);line-height:1.0;margin:0;letter-spacing:-0.01em;\">The home,<br><em style=\"font-style:italic;color:#EBD3A2;\">awakened.<\u002Fem><\u002Fh1>\n    <p data-reveal=\"\" data-delay=\"280\" style=\"max-width:460px;font-size:17px;line-height:1.7;color:#B7A98E;margin:42px 0 56px;\">Your home has been asleep. We are building the part that wakes it up.<\u002Fp>\n    <a href=\"#the-word\" data-magnet=\"\" data-reveal=\"\" data-delay=\"420\" style=\"display:inline-flex;align-items:center;justify-content:center;width:104px;height:104px;border-radius:50%;border:1px solid rgba(195,154,87,0.45);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.34em;color:#EBD3A2;transition:border-color .6s, background .6s;\" style-hover=\"border-color:#EBD3A2;background:rgba(195,154,87,0.08);color:#EBD3A2;\">BEGIN<\u002Fa>\n  <\u002Fdiv>\n\n  <div style=\"display:flex;justify-content:center;gap:clamp(28px,6vw,88px);padding:0 24px 44px;position:relative;z-index:2;flex-wrap:wrap;\">\n    <div style=\"display:flex;align-items:baseline;gap:10px;\">\n      <span style=\"width:5px;height:5px;border-radius:50%;background: tive;padding:26vh 24px;display:flex;flex-direction:column;align-items:center;text-align:center;background:#0C0A07;\">\n  <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.42em;color:#6E6350;margin-bottom:64px;\">MOVEMENT II — THE WORD<\u002Fdiv>\n  <div data-reveal=\"\" data-delay=\"100\" style=\"font-family:'Bodoni Moda',serif;font-style:italic;font-weight:400;font-size:clamp(56px, 8.5vw, 128px);color:rgba(195,154,87,0.5);line-height:1;\">κατοικία<\u002Fdiv>\n  <div data-reveal=\"\" data-delay=\"220\" style=\"display:flex;align-items:center;gap:20px;margin:44px 0;\">\n    <span style=\"display:block;width:64px;height:1px;background:rgba(195,154,87,0.35);\"><\u002Fspan>\n    <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.4em;color:#9A8C74;\">RE-ENGINEERED<\u002Fspan>\n    <span style=\"display:block;width:64px;height:1px;background:rgba(195,154,87,0.35);\"><\u002Fspan>\n  <\u002Fdiv>\n  <div data-reveal=\"\" data-delay=\"320\" style=\"font-family:'Bodoni Moda',serif;font-weight:500;font-size:clamp(40px, 5.5vw, 76px);letter-spacing:0.22em;line-height:1;\">KATIKAYA<\u002Fdiv>\n  <p data-reveal=\"\" data-delay=\"420\" style=\"max-width:520px;font-size:18px;line-height:1.85;color:#B7A98E;margin:64px 0 0;\">The Greeks had a word for the act of dwelling. We took it, and built it a nervous system. The oldest human idea, meeting the newest intelligence — under one roof.<\u002Fp>\n<\u002Fdiv>\n\n\n<div data-screen-label=\"03 The Awakening\" style=\"position:relative;padding:18vh 0 6vh;background:#0C0A07;\">\n  <div style=\"max-width:1240px;margin:0 auto;padding:0 48px;\">\n    <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.42em;color:#6E6350;margin-bottom:28px;\">MOVEMENT III — THE AWAKENING<\u002Fdiv>\n    <h2 data-reveal=\"\" data-delay=\"100\" style=\"font-family:'Bodoni Moda',serif;font-weight:400;font-size:clamp(44px,5.5vw,84px);line-height:1.08;margin:0;max-width:820px;\">One nervous system.<br><em style=\"font-style:italic;color:#EBD3A2;\">Three senses.<\u002Fem><\u002Fh2>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1240px;margin:16vh auto 0;padding:0 48px;display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:clamp(48px,6vw,96px);align-items:center;\">\n    <div data-reveal=\"\" style=\"border:1px solid rgba(195,154,87,0.18);aspect-ratio:4/3;position:relative;background:#0E0B08;\">\n      <canvas data-viz=\"water\" style=\"position:absolute;inset:0;width:100%;height:100%;\"><\u002Fcanvas>\n      <div style=\"position:absolute;top:14px;left:16px;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.3em;color:#6E6350;\">FIG. 01 — FLOW TELEMETRY<\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div data-reveal=\"\" style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:28px;\">\n        <span style=\"font-family:'Bodoni Moda',serif;font-style:italic;font-size:22px;color:rgba(195,154,87,0.6);\">01<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.42em;color:#9A8C74;\">WATER<\u002Fspan>\n      <\u002Fdiv>\n      <h3 data-reveal=\"\" data-delay=\"100\" style=\"font-family:'Bodoni Moda',serif;font-weight:400;font-size:clamp(32px,3.2vw,48px);line-height:1.2;margin:0 0 24px;\">It feels a leak before you'd ever see one.<\u002Fh3>\n      <p data-reveal=\"\" data-delay=\"180\" style=\"font-size:16px;line-height:1.8;color:#B7A98E;margin:0 0 40px;max-width:440px;\">Every liter that moves through the walls is felt. A pressure that drifts, a valve that weeps at 3 a.m. — the house notices, and closes the line before water becomes damage.<\u002Fp>\n      <div data-reveal=\"\" data-delay=\"260\" style=\"display:flex;gap:40px;border-top:1px solid rgba(195,154,87,0.18);padding-top:20px;\">\n        <div style=\"display:flex;flex-direction:column;gap:6px;\"><span data-live=\"liters\" style=\"font-family:'IBM Plex Mono',monospace;font-size:20px;color:#9FE8DC;\">414<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.24em;color:#6E6350;\">LITERS TODAY<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:6px;\"><span data-live=\"water\" style=\"font-family:'IBM Plex Mono',monospace;font-size:20px;color:#9FE8DC;\">2.8<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.24em;color:#6E6350;\">L/MIN NOW<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1240px;margin:18vh auto 0;padding:0 48px;display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:clamp(48px,6vw,96px);align-items:center;direction:rtl;\">\n    <div data-reveal=\"\" style=\"border:1px solid rgba(195,154,87,0.18);aspect-ratio:4/3;position:relative;background:#0E0B08;direction:ltr;\">\n      <canvas data-viz=\"energy\" style=\"position:absolute;inset:0;width:100%;height:100%;\"><\u002Fcanvas>\n      <div style=\"position:absolute;top:14px;left:16px;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.3em;color:#6E6350;\">FIG. 02 — METABOLISM<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"direction:ltr;\">\n      <div data-reveal=\"\" style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:28px;\">\n        <span style=\"font-family:'Bodoni Moda',serif;font-style:italic;font-size:22px;color:rgba(195,154,87,0.6);\">02<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.42em;color:#9A8C74;\">ENERGY<\u002Fspan>\n      <\u002Fdiv>\n      <h3 data-reveal=\"\" data-delay=\"100\" style=\"font-family:'Bodoni Moda',serif;font-weight:400;font-size:clamp(32px,3.2vw,48px);line-height:1.2;margin:0 0 24px;\">It knows what the sun gave, and what remains.<\u002Fh3>\n      <p data-reveal=\"\" data-delay=\"180\" style=\"font-size:16px;line-height:1.8;color:#B7A98E;margin:0 0 40px;max-width:440px;\">The house understands its own metabolism — what arrives from the roof, what the rooms consume, what the batteries hold for the night. Nothing is guessed. Everything is accounted for.<\u002Fp>\n      <div data-reveal=\"\" data-delay=\"260\" style=\"display:flex;gap:40px;border-top:1px solid rgba(195,154,87,0.18);padding-top:20px;\">\n        <div style=\"display:flex;flex-direction:column;gap:6px;\"><span data-live=\"energy\" style=\"font-family:'IBM Plex Mono',monospace;font-size:20px;color:#9FE8DC;\">3.12<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.24em;color:#6E6350;\">KW FROM SUN<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:6px;\"><span data-live=\"stored\" style=\"font-family:'IBM Plex Mono',monospace;font-size:20px;color:#9FE8DC;\">86<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.24em;color:#6E6350;\">% HELD FOR NIGHT<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1240px;margin:18vh auto 0;padding:0 48px;display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:clamp(48px,6vw,96px);align-items:center;\">\n    <div data-reveal=\"\" style=\"border:1px solid rgba(195,154,87,0.18);aspect-ratio:4/3;position:relative;background:#0E0B08;\">\n      <canvas data-viz=\"presence\" style=\"position:absolute;inset:0;width:100%;height:100%;\"><\u002Fcanvas>\n      <div style=\"position:absolute;top:14px;left:16px;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.3em;color:#6E6350;\">FIG. 03 — RHYTHM OF ROOMS<\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div data-reveal=\"\" style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:28px;\">\n        <span style=\"font-family:'Bodoni Moda',serif;font-style:italic;font-size:22px;color:rgba(195,154,87,0.6);\">03<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.42em;color:#9A8C74;\">PRESENCE<\u002Fspan>\n      <\u002Fdiv>\n      <h3 data-reveal=\"\" data-delay=\"100\" style=\"font-family:'Bodoni Moda',serif;font-weight:400;font-size:clamp(32px,3.2vw,48px);line-height:1.2;margin:0 0 24px;\">It knows what normal feels like.<\u002Fh3>\n      <p data-reveal=\"\" data-delay=\"180\" style=\"font-size:16px;line-height:1.8;color:#B7A98E;margin:0 0 40px;max-width:440px;\">Which rooms are alive. Who moves where, and when. The house learns its own rhythm — so the moment something falls outside it, the house is the first to know.<\u002Fp>\n      <div data-reveal=\"\" data-delay=\"260\" style=\"display:flex;gap:40px;border-top:1px solid rgba(195,154,87,0.18);padding-top:20px;\">\n        <div style=\"display:flex;flex-direction:column;gap:6px;\"><span data-live=\"presence\" style=\"font-family:'IBM Plex Mono',monospace;font-size:20px;color:#9FE8DC;\">3<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.24em;color:#6E6350;\">ROOMS ALIVE<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:6px;\"><span data-live=\"temp\" style=\"font-family:'IBM Plex Mono',monospace;font-size:20px;color:#9FE8DC;\">21.4<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.24em;color:#6E6350;\">°C AMBIENT<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:900px;margin:24vh auto 10vh;padding:0 48px;text-align:center;\">\n    <div data-reveal=\"\" style=\"width:min(420px,80%);aspect-ratio:5/4;margin:0 auto 64px;position:relative;\">\n      <canvas data-viz=\"walls\" style=\"position:absolute;inset:0;width:100%;height:100%;\"><\u002Fcanvas>\n      <div style=\"position:absolute;bottom:0;left:50%;transform:translateX(-50%);font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.3em;color:#6E6350;white-space:nowrap;\">FIG. 04 — NOTHING LEAVES THE WALLS<\u002Fdiv>\n    <\u002Fdiv>\n    <h3 data-reveal=\"\" data-delay=\"120\" style=\"font-family:'Bodoni Moda',serif;font-weight:400;font-size:clamp(36px,4.5vw,64px);line-height:1.18;margin:0 0 28px;\">The intelligence lives <em style=\"font-style:italic;color:#EBD3A2;\">here.<\u002Fem><\u002Fh3>\n    <p data-reveal=\"\" data-delay=\"220\" style=\"font-size:17px;line-height:1.85;color:#B7A98E;margin:0;max-width:520px;display:inline-block;\">The brain is on the premises. What the house knows about you stays inside its walls — sovereign, private, yours. Not rented from a distant cloud.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div data-screen-label=\"04 The Atelier\" style=\"position:relative;padding:20vh 0;background:#120E0A;border-top:1px solid rgba(195,154,87,0.14);border-bottom:1px solid rgba(195,154,87,0.14);\">\n  <div style=\"max-width:1240px;margin:0 auto;padding:0 48px;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:24px;margin-bottom:12vh;\">\n      <div>\n        <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.42em;color:#6E6350;margin-bottom:28px;\">MOVEMENT IV — THE ATELIER<\u002Fdiv>\n        <h2 data-reveal=\"\" data-delay=\"100\" style=\"font-family:'Bodoni Moda',serif;font-weight:400;font-size:clamp(44px,5.5vw,84px);line-height:1.08;margin:0;\">Collection I<\u002Fh2>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-delay=\"200\" style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.28em;color:#9A8C74;line-height:2;text-align:right;\">THREE INSTRUMENTS.<br>MADE IN SMALL NUMBERS.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1px;background:rgba(195,154,87,0.14);border:1px solid rgba(195,154,87,0.14);\">\n      <div data-reveal=\"\" style=\"background:#120E0A;padding:32px;display:flex;flex-direction:column;gap:0;\">\n        <div style=\"aspect-ratio:3/ ;margin-bottom:10px;\">The Energy Sense<\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.7;color:#9A8C74;margin:0 0 28px;flex:1;\">Sun, storage, and use — read as one ledger.<\u002Fp>\n        <a href=\"#the-marque\" style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.28em;color:#C39A57;border-bottom:1px solid rgba(195,154,87,0.35);padding-bottom:6px;align-self:flex-start;transition:color .5s;\">RESERVE INTEREST →<\u002Fa>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-delay=\"240\" style=\"background:#120E0A;padding:32px;display:flex;flex-direction:column;gap:0;\">\n        <div style=\"aspect-ratio:3/4;background:repeating-linear-gradient(-45deg, rgba(195,154,87,0.06) 0px, rgba(195,154,87,0.06) 1px, rgba(18,14,10,0) 1px, rgba(18,14,10,0) 9px), #0E0B08;display:flex;align-items:center;justify-content:center;margin-bottom:28px;\">\n          <span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.26em;color:#6E6350;text-align:center;line-height:2;\">[ PRODUCT STILL ]<br>PRESENCE INSTRUMENT<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.3em;color:#6E6350;margin-bottom:12px;\">III / PRESENCE<\u002Fdiv>\n        <div style=\"font-family:'Bodoni Moda',serif;font-size:26px;margin-bottom:10px;\">The Presence Sense<\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.7;color:#9A8C74;margin:0 0 28px;flex:1;\">The rhythm of the rooms, kept without cameras.<\u002Fp>\n        <a href=\"#the-marque\" style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.28em;color:#C39A57;border-bottom:1px solid rgba(195,154,87,0.35);padding-bottom:6px;align-self:flex-start;transition:color .5s;\">RESERVE INTEREST →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.28em;color:#6E6350;margin-top:32px;text-align:center;\">NO CHECKOUT. NO CART. THE COLLECTION OPENS TO THE FOUNDING CIRCLE FIRST.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div data-screen-label=\"05 Beyond the Home\" style=\"position:relative;padding:26vh 24px;text-align:center;background:#0C0A07;\">\n  <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.42em;color:#6E6350;margin-bottom:56px;\">MOVEMENT V — BEYOND THE HOME<\u002Fdiv>\n  <h2 data-reveal=\"\" data-delay=\"100\" style=\"font-family:'Bodoni Moda',serif;font-weight:400;font-size:clamp(34px,4.5vw,64px);line-height:1.25;margin:0 auto;max-width:840px;\">The same awareness, extended to the places<br style=\"display:none;\"> that protect people — <em style=\"font-style:italic;color:#EBD3A2;\">where the youngest learn, and the oldest are cared for.<\u002Fem><\u002Fh2>\n  <div data-reveal=\"\" data-delay=\"220\" style=\"margin-top:64px;\"><a href=\"mailto:private@katikaya.com\" style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.32em;color:#C39A57;border-bottom:1px solid rgba(195,154,87,0.35);padding-bottom:6px;\">PRIVATE INQUIRIES →<\u002Fa><\u002Fdiv>\n<\u002Fdiv>\n\n<div id=\"the-marque\" data-screen-label=\"06 The Marque\" style=\"position:relative;padding:20vh 0;background:#120E0A;border-top:1px solid rgba(195,154,87,0.14);\">\n  <div style=\"max-width:1240px;margin:0 auto;padding:0 48px;display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:clamp(48px,8vw,140px);align-items:start;\">\n    <div>\n      <div data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.42em;color:#6E6350;margin-bottom:28px;\">MOVEMENT VI — THE MARQUE<\u002Fdiv>\n      <h2 data-reveal=\"\" data-delay=\"100\" style=\"font-family:'Bodoni Moda',serif;font-weight:400;font-size:clamp(38px,4.5vw,68px);line-height:1.15;margin:0 0 32px;\">Built by hands that understand buildings.<\u002Fh2>\n      <p data-reveal=\"\" data-delay=\"200\" style=\"font-size:16px;line-height:1.85;color:#B7A98E;margin:0;max-width:460px;\">Katikaya comes from construction and hardware — from people who have poured foundations and pulled cable through walls. We did not guess at what a home is. We have built them. Now we are building the part that has always been missing: the part that knows.<\u002Fp>\n    <\u002Fdiv>\n    <div data-reveal=\"\" data-delay=\"150\" style=\"border:1px solid rgba(195,154,87,0.22);padding:clamp(32px,4vw,56px);background:#0E0B08;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.36em;color:#C39A57;margin-bottom:20px;\">THE FOUNDING CIRCLE<\u002Fdiv>\n      <div style=\"font-family:'Bodoni Moda',serif;font-size:clamp(24px,2.4vw,34px);line-height:1.3;margin-bottom:16px;\">A hundred homes will wake first.<\u002Fdiv>\n      <p style=\"font-size:14px;line-height:1.75;color:#9A8C74;margin:0 0 36px;\">Members of the circle shape the platform, receive Collection I before anyone, and are named in the record of the marque.<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <input type=\"email\" placeholder=\"your@address.com\" style=\"background:transparent;border:1px solid rgba(195,154,87,0.3);color:#EDE4D3;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:0.06em;padding:16px 18px;outline:none;\" style-focus=\"border-color:#EBD3A2;\">\n        <button data-magnet=\"\" style=\"background:#C39A57;color:#0C0A07;border:none;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.32em;padding:18px;cursor:pointer;transition:background .5s;\" style-hover=\"background:#EBD3A2;\">REQUEST A PLACE<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.24em;color:#6E6350;margin-top:20px;\">BY INVITATION AND REQUEST. NOT A NEWSLETTER.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div data-screen-label=\"07 Coda\" style=\"position:relative;padding:22vh 24px 60px;text-align:center;background:#0C0A07;overflow:hidden;\">\n  <div style=\"position:absolute;left:50%;top:-30vh;width:110vw;height:60vh;border-radius:50%;background:radial-gradient(ellipse at center, rgba(195,154,87,0.1) 0%, rgba(12,10,7,0) 65%);transform:translateX(-50%);pointer-events:none;\"><\u002Fdiv>\n  <div data-reveal=\"\" style=\"font-family:'Bodoni Moda',serif;font-size:clamp(40px,6vw,88px);letter-spacing:0.24em;font-weight:500;position:relative;\">KATIKAYA<\u002Fdiv>\n  <div data-reveal=\"\" data-delay=\"120\" style=\"font-family:'Bodoni Moda',serif;font-style:italic;font-size:18px;color:rgba(195,154,87,0.55);margin-top:18px;\">κατοικία — to dwell<\u002Fdiv>\n  <p data-reveal=\"\" data-delay=\"220\" style=\"font-size:15px;color:#9A8C74;margin:56px auto 0;max-width:380px;line-height:1.8;\">It notices. It remembers. It responds.<br>Your home is waiting to be introduced.<\u002Fp>\n  <div data-reveal=\"\" data-delay=\"300\" style=\"display:flex;justify-content:center;gap:clamp(24px,4vw,56px);margin-top:72px;flex-wrap:wrap;\">\n    <a href=\"#the-word\" style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.28em;color:#9A8C74;\">THE WORD<\u002Fa>\n    <a href=\"#the-marque\" style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.28em;color:#9A8C74;\">THE CIRCLE<\u002Fa>\n    <a href=\"mailto:private@katikaya.com\" style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.28em;color:#9A8C74;\">INQUIRIES<\u002Fa>\n  <\u002Fdiv>\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.24em;color:#4E4638;margin-top:80px;\">© MMXXVI KATIKAYA — THE INTELLIGENT DWELLING<\u002Fdiv>\n<\u002Fdiv><\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;ambientMotion&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Motion&quot;},&quot;particleDensity&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:1,&quot;min&quot;:0.4,&quot;max&quot;:2,&quot;step&quot;:0.1,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Motion&quot;},&quot;dataLight&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#9FE8DC&quot;,&quot;options&quot;:[&quot;#9FE8DC&quot;,&quot;#EBD3A2&quot;,&quot;#BFD9F2&quot;,&quot;#F2EBDD&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Light&quot;}}\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    this._cleanup = [];\n    const ease = 'cubic-bezier(.16,1,.3,1)';\n    const hexA = (hex, a) => {\n      const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);\n      return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';\n    };\n\n    // Scroll reveals — below-fold elements descend into place\n    const io = new IntersectionObserver((es) => {\n      for (const e of es) {\n        if (e.isIntersecting) {\n          e.target.style.opacity = '1';\n          e.target.style.transform = 'none';\n          io.unobserve(e.target);\n        }\n      }\n    }, { threshold: 0.15 });\n    document.querySelectorAll('[data-reveal]').forEach((el) => {\n      if (el.getBoundingClientRect().top < window.innerHeight * 0.92) return;\n      const d = el.getAttribute('data-delay') || '0';\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(44px)';\n      el.style.transition = 'opacity 1.6s ' + ease + ' ' + d + 'ms, transform 1.6s ' + ease + ' ' + d + 'ms';\n      io.observe(el);\n    });\n    this._cleanup.push(() => io.disconnect());\n\n    // Magnetic elements — anticipate the cursor\n    document.querySelectorAll('[data-magnet]').forEach((el) => {\n      const move = (ev) => {\n        const r = el.getBoundingClientRect();\n        const dx = ev.clientX - (r.left + r.width / 2), dy = ev.clientY - (r.top + r.height / 2);\n        el.style.transform = 'translate(' + (dx * 0.16).toFixed(1) + 'px,' + (dy * 0.16).toFixed(1) + 'px)';\n      };\n      const out = () => { el.style.transform = 'translate(0,0)'; };\n      el.addEventListener('mousemove', move);\n      el.addEventListener('mouseleave', out);\n      this._cleanup.push(() => { el.removeEventListener('mousemove', move); el.removeEventListener('mouseleave', out); });\n    });\n\n    // Canvas painters\n    const painters = [];\n    const setup = (id, fn) => {\n      const c = document.querySelector('[data-viz=\"' + id + '\"]');\n      if (!c) return;\n      const g = c.getContext('2d');\n      const fit = () => { const r = c.getBoundingClientRect(); c.width = Math.max(2, r.width * 2); c.height = Math.max(2, r.height * 2); };\n      fit();\n      window.addEventListener('resize', fit);\n      this._cleanup.push(() => window.removeEventListener('resize', fit));\n      painters.push((t) => fn(g, c.width, c.height, t));\n    };\n\n    const threadY = (h, row, x, t) =>\n      h * (0.2 + row * 0.15) + Math.sin(x * 0.004 + t * (0.6 + row * 0.12) + row * 2) * h * 0.05 + Math.sin(x * 0.011 - t * 0.9) * h * 0.02;\n\n    setup('water', (g, w, h, t) => {\n      g.clearRect(0, 0, w, h);\n      const dl = this._dataLight(), dens = this._density();\n      for (let i = 0; i < 5; i++) {\n        g.beginPath();\n        for (let x = 0; x <= w; x += 8) { const y = threadY(h, i, x, t); x === 0 ? g.moveTo(x, y) : g.lineTo(x, y); }\n        g.strokeStyle = hexA(dl, 0.05 + i * 0.02);\n        g.lineWidth = 2;\n        g.stroke();\n      }\n      const n = Math.round(26 * dens);\n      for (let i = 0; i < n; i++) {\n        const row = i % 5;\n        const p = ((t * (40 + row * 14) + i * 137) % (w + 40)) - 20;\n        const y = threadY(h, row, p, t);\n        g.beginPath();\n        g.arc(p, y, 3, 0, 7);\n        g.fillStyle = hexA(dl, 0.35 + 0.3 * (1 + Math.sin(t * 2 + i)) / 2);\n        g.fill();\n      }\n    });\n\n    setup('energy', (g, w, h, t) => {\n      g.clearRect(0, 0, w, h);\n      const dl = this._dataLight(), dens = this._density();\n      const sx = w * 0.18, sy = h * 0.26, hx = w * 0.8, hy = h * 0.72;\n      let gr = g.createRadialGradient(sx, sy, 0, sx, sy, h * 0.34);\n      gr.addColorStop(0, 'rgba(235,211,162,' + (0.32 + 0.1 * Math.sin(t * 0.8)) + ')');\n      gr.addColorStop(1, 'rgba(235,211,162,0)');\n      g.fillStyle = gr; g.beginPath(); g.arc(sx, sy, h * 0.34, 0, 7); g.fill();\n      for (let r = 1; r <= 3; r++) {\n        g.beginPath(); g.arc(sx, sy, h * 0.09 * r + Math.sin(t * 1.2 + r) * 4, 0, 7);\n        g.strokeStyle = 'rgba(195,154,87,' + (0.22 - r * 0.05) + ')'; g.lineWidth = 1.5; g.stroke();\n      }\n      const bez = (u) => {\n        const cx = w * 0.5, cy = h * 0.2;\n        const x = (1 - u) * (1 - u) * sx + 2 * (1 - u) * u * cx + u * u * hx;\n        const y = (1 - u) * (1 - u) * sy + 2 * (1 - u) * u * cy + u * u * hy;\n        return [x, y];\n      };\n      g.beginPath();\n      for (let u = 0; u <= 1.001; u += 0.02) { const p = bez(u); u === 0 ? g.moveTo(p[0], p[1]) : g.lineTo(p[0], p[1]); }\n      g.strokeStyle = 'rgba(195,154,87,0.18)'; g.lineWidth = 2; g.stroke();\n      const n = Math.round(9 * dens);\n      for (let i = 0; i < n; i++) {\n        const u = ((t * 0.14 + i / n) % 1);\n        const p = bez(u);\n        g.beginPath(); g.arc(p[0], p[1], 3.4, 0, 7);\n        g.fillStyle = hexA(dl, 0.75 * (1 - Math.abs(u - 0.5) * 0.8)); g.fill();\n      }\n      gr = g.createRadialGradient(hx, hy, 0, hx, hy, h * 0.22);\n      gr.addColorStop(0, hexA(dl, 0.22 + 0.08 * Math.sin(t * 1.6)));\n      gr.addColorStop(1, hexA(dl, 0));\n      g.fillStyle = gr; g.beginPath(); g.arc(hx, hy, h * 0.22, 0, 7); g.fill();\n      g.strokeStyle = 'rgba(237,228,211,0.5)'; g.lineWidth = 2;\n      g.strokeRect(hx - 26, hy - 18, 52, 36);\n      g.beginPath(); g.moveTo(hx - 34, hy - 18); g.lineTo(hx, hy - 42); g.lineTo(hx + 34, hy - 18); g.stroke();\n    });\n\n    setup('presence', (g, w, h, t) => {\n      g.clearRect(0, 0, w, h);\n      const dl = this._dataLight();\n      const x0 = w * 0.12, y0 = h * 0.14, W = w * 0.76, H = h * 0.72;\n      g.strokeStyle = 'rgba(195,154,87,0.4)'; g.lineWidth = 2;\n      g.strokeRect(x0, y0, W, H);\n      const vx = x0 + W * 0.55, hy2 = y0 + H * 0.5;\n      g.beginPath();\n      g.moveTo(vx, y0); g.lineTo(vx, y0 + H * 0.34); g.moveTo(vx, y0 + H * 0.52); g.lineTo(vx, y0 + H);\n      g.moveTo(x0, hy2); g.lineTo(x0 + W * 0.3, hy2); g.moveTo(x0 + W * 0.44, hy2); g.lineTo(vx, hy2);\n      g.strokeStyle = 'rgba(195,154,87,0.25)'; g.lineWidth = 1.5; g.stroke();\n      const rooms = [\n        [x0 + W * 0.27, y0 + H * 0.26], [x0 + W * 0.27, y0 + H * 0.75],\n        [x0 + W * 0.78, y0 + H * 0.3], [x0 + W * 0.78, y0 + H * 0.72]\n      ];\n      for (let i = 0; i < 3; i++) {\n        const base = rooms[(Math.floor(t / 7) + i * 2) % 4];\n        const nxt = rooms[(Math.floor(t / 7) + i * 2 + 1) % 4];\n        const ph = Math.min(1, Math.max(0, (t % 7) - 5.4) / 1.6);\n        const sm = ph * ph * (3 - 2 * ph);\n        const px = base[0] + (nxt[0] - base[0]) * sm + Math.sin(t * 0.7 + i * 3) * w * 0.03;\n        const py = base[1] + (nxt[1] - base[1]) * sm + Math.cos(t * 0.5 + i * 2) * h * 0.03;\n        const R = h * 0.15;\n        const gr = g.createRadialGradient(px, py, 0, px, py, R);\n        gr.addColorStop(0, hexA(dl, 0.3 + 0.1 * Math.sin(t * 1.4 + i)));\n        gr.addColorStop(1, hexA(dl, 0));\n        g.fillStyle = gr; g.beginPath(); g.arc(px, py, R, 0, 7); g.fill();\n        g.beginPath(); g.arc(px, py, 3.5, 0, 7); g.fillStyle = hexA(dl, 0.9); g.fill();\n      }\n    });\n\n    setup('walls', (g, w, h, t) => {\n      g.clearRect(0, 0, w, h);\n      const dl = this._dataLight();\n      const x0 = w * 0.2, y0 = h * 0.16, W = w * 0.6, H = h * 0.68;\n      if (!this._wp) {\n        this._wp = [];\n        for (let i = 0; i < 34; i++) this._wp.push({ x: x0 + Math.random() * W, y: y0 + Math.random() * H, vx: (Math.random() - 0.5) * 1.4, vy: (Math.random() - 0.5) * 1.4 });\n      }\n      const cx = x0 + W / 2, cy = y0 + H / 2;\n      const gr = g.createRadialGradient(cx, cy, 0, cx, cy, H * 0.42);\n      gr.addColorStop(0, 'rgba(195,154,87,' + (0.24 + 0.08 * Math.sin(t * 1.1)) + ')');\n      gr.addColorStop(1, 'rgba(195,154,87,0)');\n      g.fillStyle = gr; g.beginPath(); g.arc(cx, cy, H * 0.42, 0, 7); g.fill();\n      g.beginPath(); g.arc(cx, cy, 5, 0, 7); g.fillStyle = '#EBD3A2'; g.fill();\n      for (const p of this._wp) {\n        p.x += p.vx; p.y += p.vy;\n        if (p.x < x0 || p.x > x0 + W) { p.vx *= -1; p.x = Math.max(x0, Math.min(x0 + W, p.x)); }\n        if (p.y < y0 || p.y > y0 + H) { p.vy *= -1; p.y = Math.max(y0, Math.min(y0 + H, p.y)); }\n        g.beginPath(); g.arc(p.x, p.y, 2.2, 0, 7); g.fillStyle = hexA(dl, 0.5); g.fill();\n      }\n      g.strokeStyle = 'rgba(237,228,211,0.55)'; g.lineWidth = 2.5;\n      g.strokeRect(x0, y0, W, H);\n      g.beginPath(); g.moveTo(x0 - 14, y0); g.lineTo(x0 + W / 2, y0 - h * 0.1); g.lineTo(x0 + W + 14, y0); g.stroke();\n    });\n\n    // Live readouts\n    const fmt = {\n      water: (t) => (2.6 + Math.sin(t * 0.7) * 0.5 + Math.sin(t * 0.13) * 0.3).toFixed(1),\n      energy: (t) => (3.1 + Math.sin(t * 0.4 + 2) * 0.8).toFixed(2),\n      presence: (t) => String(3 + (Math.sin(t * 0.23) > 0.6 ? 1 : 0)),\n      liters: (t) => String(Math.round(412 + Math.sin(t * 0.3) * 6 + t % 60)),\n      stored: (t) => (86 + Math.sin(t * 0.2) * 3).toFixed(0),\n      temp: (t) => (21.4 + Math.sin(t * 0.05) * 0.4).toFixed(1)\n    };\n    const lives = Array.from(document.querySelectorAll('[data-live]'));\n\n    const loop = (now) => {\n      this._raf = requestAnimationFrame(loop);\n      if (this.props.ambientMotion === false) return;\n      const t = now / 1000;\n      painters.forEach((p) => p(t));\n      if (now - (this._last || 0) > 200) {\n        this._last = now;\n        const dl = this._dataLight();\n        lives.forEach((el) => {\n          const k = el.getAttribute('data-live');\n          if (fmt[k]) el.textContent = fmt[k](t);\n          el.style.color = dl;\n        });\n      }\n    };\n    this._raf = requestAnimationFrame(loop);\n  }\n  _dataLight() { return this.props.dataLight ?? '#9FE8DC'; }\n  _density() { return this.props.particleDensity ?? 1; }\n  componentWillUnmount() {\n    cancelAnimationFrame(this._raf);\n    (this._cleanup || []).forEach((f) => f());\n  }\n  renderVals() { return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
